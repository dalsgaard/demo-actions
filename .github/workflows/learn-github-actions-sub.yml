name: learn-github-actions-sub
run-name: ${{ github.actor }} is learning GitHub Actions Sub
on:
  workflow_run:
    workflows:
      - learn-github-actions
    types:
      - completed
jobs:
  echo:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Sub Workflow"
  user:
    runs-on: ubuntu-latest
    steps:
      - run: gh api users/dalsgaard
    env:
      GH_TOKEN: ${{ github.token }}
